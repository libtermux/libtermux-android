name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  lint-and-test:
    name: Lint & Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant execute permission to gradlew
        run: chmod +x gradlew

      - name: Run lint
        run: ./gradlew :core:lint --stacktrace

      - name: Run unit tests
        run: ./gradlew :core:testDebugUnitTest --stacktrace

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: core/build/reports/tests/

      - name: Upload lint results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: lint-results
          path: core/build/reports/lint-results*.html

  build-debug:
    name: Build Debug AAR
    runs-on: ubuntu-latest
    needs: lint-and-test

    steps:
      - uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Build debug AAR
        run: ./gradlew :core:assembleDebug --stacktrace

      - name: Upload debug AAR
        uses: actions/upload-artifact@v4
        with:
          name: libtermux-debug-aar
          path: core/build/outputs/aar/*.aar

  build-sample:
    name: Build Sample APK
    runs-on: ubuntu-latest
    needs: build-debug

    steps:
      - uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Build sample APK
        run: ./gradlew :sample:assembleDebug --stacktrace

      - name: Upload sample APK
        uses: actions/upload-artifact@v4
        with:
          name: sample-debug-apk
          path: sample/build/outputs/apk/debug/*.apk
